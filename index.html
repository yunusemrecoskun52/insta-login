<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Instagram Login</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

  <div>

    <!-- LOGIN BOX -->
    <div class="login-box text-center p-5">

      <h1 class="logo mb-4">Instagram'a Giriş yap</h1>

      <input
        type="text"
        class="form-control py-3 mb-3"
        placeholder="Phone number, username or email"
      />

      <input
        type="password"
        class="form-control py-3 mb-3"
        placeholder="Password"
      />

      

      <!--  css'de  .giriş-btn  adı -->
      <button class="btn btn-primary btn-lg form-control py-3 mb-3 rounded-pill w-100 giriş-btn">
       Log in

      </button>

      <!-- css'de  .şifrenimi-unuttun  yaz  -->
      <button class="btn btn-light btn-lg form-control py-3 mb-5 rounded-pill w-100 şifrenimi-unuttun">
      Forgot password?
      </button>

      <!-- css'de  .fb-giriş  yaz  -->
      <button class="btn btn-secondary btn-lg form-control py-3 mb-3 rounded-pill w-100 fb-giriş">
      <img src="facebook.png" class="fb-icon">
      Log in with Facebook 
      </button>
      
      <!-- css'de  .yenihesap-giriş  yaz  -->
      <button class="btn btn-primary btn-lg form-control py-3  rounded-pill w-100 yenihesap-giriş">
      Create new account
      </button>

      <!-- css'de  .meta-giriş  yaz  -->
      <button class="btn btn-light btn-lg  form-control py-3 mb-3 rounded-pill w-50 meta-giriş">
      <img src="meta.png" class="meta-icon"> 
      Meta
      </button>
      
    </div>

    

  </div>

</div>

</body>
</html>
