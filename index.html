<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Instagram Login</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

  <div>

    <!-- LOGIN BOX -->
    <div class="login-box text-center p-5">

      <h1 class="logo mb-4">Instagram</h1>

      <input
        type="text"
        class="form-control mb-2"
        placeholder="Phone number, username or email"
      />

      <input
        type="password"
        class="form-control mb-3"
        placeholder="Password"
      />

      <button class="btn btn-primary w-100 rounded-pill fw-bold">
        Log In
      </button>

      <div class="divider my-3">OR</div>

      <a href="#" class="fb-login d-block mb-3">
        Log in with Facebook
      </a>

      <a href="#" class="forgot">
        Forgot password?
      </a>

    </div>

    <!-- SIGNUP -->
    <div class="signup-box text-center mt-3 p-4">
      Don't have an account?
      <a href="#">Sign up</a>
    </div>

  </div>

</div>

</body>
</html>
